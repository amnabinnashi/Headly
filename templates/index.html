<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Headly</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #3ca55c, #2f6b3f);
    text-align: center;
    color: white;
    padding: 20px;
}

input {
    padding: 10px;
    width: 60%;
    border-radius: 20px;
    border: none;
}

button {
    padding: 10px 20px;
    border-radius: 20px;
    border: none;
    background: #00ff88;
    cursor: pointer;
}

.card {
    margin: 15px auto;
    padding: 15px;
    width: 90%;
    max-width: 400px;
    border-radius: 15px;
    background: rgba(255,255,255,0.1);
}

.footer {
    margin-top: 20px;
    color: #ddd;
}
</style>

</head>
<body>

<h1>Headly</h1>
<p>Advanced Website Analyzer</p>

<input type="text" id="url" placeholder="https://example.com">
<button onclick="analyze()">Analyze</button>

<div class="card"><h3>SEO Score</h3><div id="score">-</div></div>
<div class="card"><h3>Meta Title</h3><div id="title">-</div></div>
<div class="card"><h3>Meta Description</h3><div id="desc">-</div></div>
<div class="card"><h3>Headings</h3><div id="headings">-</div></div>
<div class="card"><h3>Links</h3><div id="links">-</div></div>
<div class="card"><h3>SEO Suggestions</h3><div id="suggestions">-</div></div>

<div class="footer">© 2026 Headly by Amna</div>

<script>
async function analyze() {
    const url = document.getElementById("url").value;

    const res = await fetch("/analyze", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({url})
    });

    const data = await res.json();

    document.getElementById("score").innerText = data.score || "-";
    document.getElementById("title").innerText = data.title || "-";
    document.getElementById("desc").innerText = data.description || "-";
    document.getElementById("headings").innerText =
        `H1: ${data.h1} | H2: ${data.h2} | H3: ${data.h3}`;
    document.getElementById("links").innerText =
        `Internal: ${data.internal_links} | External: ${data.external_links}`;

    document.getElementById("suggestions").innerHTML =
        data.suggestions.map(s => "• " + s).join("<br>");
}
</script>

</body>
</html>
