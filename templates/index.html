<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Web Insight Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e1e2f, #3a0ca3);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
        }

        .lang-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 10px 15px;
            border-radius: 10px;
            color: white;
            cursor: pointer;
        }

        .container {
            text-align: center;
            margin-top: 80px;
            padding: 20px;
        }

        h1 {
            font-size: 42px;
            margin-bottom: 10px;
        }

        p.subtitle {
            color: #ccc;
            margin-bottom: 30px;
        }

        form {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        input {
            padding: 15px;
            width: 300px;
            border-radius: 12px;
            border: none;
            outline: none;
            font-size: 16px;
        }

        button {
            padding: 15px 25px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #ff7b00, #ff006e);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .results {
            margin-top: 40px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .card {
            background: rgba(255,255,255,0.08);
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 12px;
            text-align: left;
            backdrop-filter: blur(10px);
        }

        .tag {
            font-weight: bold;
            color: #ffbe0b;
        }

        .footer {
            margin-top: auto;
            text-align: center;
            padding: 20px;
            color: #aaa;
            font-size: 14px;
        }

        .copy-btn {
            margin-top: 20px;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">🚀 Web Insight Pro</div>
    <button class="lang-btn">🌐 عربي</button>
</header>

<div class="container">
    <h1>Analyze Websites Easily</h1>
    <p class="subtitle">Extract headings instantly from any website</p>

    <form method="POST">
        <input type="text" name="url" placeholder="Enter website URL..." required>
        <button type="submit">Analyze</button>
    </form>

    {% if results %}
    <div class="results">
        <p>Found {{ results|length }} headings</p>

        {% for item in results %}
        <div class="card">
            <div class="tag">{{ item.tag }}</div>
            <div>{{ item.text }}</div>
        </div>
        {% endfor %}

        <button class="copy-btn" onclick="copyResults()">Copy Results</button>
    </div>
    {% endif %}
</div>

<div class="footer">
    © 2026 Web Insight Pro | All Rights Reserved
</div>

<script>
    function copyResults() {
        let text = "";
        const items = document.querySelectorAll(".card");

        items.forEach(item => {
            text += item.innerText + "\\n";
        });

        navigator.clipboard.writeText(text);
        alert("Copied!");
    }
</script>

</body>
</html>
