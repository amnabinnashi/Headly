<!DOCTYPE html>
<html>
<head>
    <title>Web Insight Scraper</title>
</head>
<body style="text-align:center; font-family:Arial">

<h1>🚀 Web Insight Scraper</h1>

<form method="POST">
    <input type="text" name="url" placeholder="Enter website URL" required>
    <button type="submit">Analyze</button>
</form>

{% if data %}
    <h2>Results:</h2>
    <table border="1" style="margin:auto">
        <tr>
            <th>Type</th>
            <th>Content</th>
            <th>Time</th>
        </tr>

        {% for item in data %}
        <tr>
            <td>{{ item["Type"] }}</td>
            <td>{{ item["Content"] }}</td>
            <td>{{ item["Scraped At"] }}</td>
        </tr>
        {% endfor %}
    </table>
{% endif %}

</body>
</html>
