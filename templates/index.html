<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Headly Pro</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h1>Headly Pro 🚀</h1>
    <p>Advanced Website Analyzer</p>

    <div class="search-box">
        <input type="text" id="url" placeholder="Enter Website URL">
        <button onclick="analyze()">Analyze</button>
    </div>

    <!-- RESULTS -->
    <div id="results" class="hidden">

        <div class="card">
            <h2>SEO Score</h2>
            <p id="seoScore"></p>
        </div>

        <div class="card">
            <h2>Meta Info</h2>
            <p><strong>Title:</strong> <span id="metaTitle"></span></p>
            <p><strong>Description:</strong> <span id="metaDesc"></span></p>
        </div>

        <div class="card">
            <h2>Headings</h2>
            <p id="headings"></p>
        </div>

        <div class="card">
            <h2>Links</h2>
            <p id="links"></p>
        </div>

        <div class="card">
            <h2>Data</h2>
            <table id="dataTable"></table>
        </div>

    </div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
