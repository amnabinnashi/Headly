<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Headly</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

    <h1>Headly</h1>
    <p class="subtitle">Advanced Website Analyzer</p>

    <div class="input-box">
        <input id="url" type="text" placeholder="https://example.com">
        <button onclick="analyze()">Analyze</button>
    </div>

    <!-- RESULTS -->
    <div id="results" class="results hidden">

        <div class="card">
            <h3>SEO Score</h3>
            <div id="score" class="value">-</div>
        </div>

        <div class="card">
            <h3>Meta Title</h3>
            <div id="title" class="value">-</div>
        </div>

        <div class="card">
            <h3>Meta Description</h3>
            <div id="desc" class="value">-</div>
        </div>

        <div class="card">
            <h3>Headings</h3>
            <div id="headings" class="value">-</div>
        </div>

        <div class="card">
            <h3>Links</h3>
            <div id="links" class="value">-</div>
        </div>

        <div class="card">
            <h3>SEO Suggestions</h3>
            <div id="suggestions" class="value">-</div>
        </div>

    </div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
