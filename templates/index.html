<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Insight Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: radial-gradient(circle at top, #1a1a2e, #0f0f1a);
    color: white;
}

/* NAV */
nav {
    display: flex;
    justify-content: space-between;
    padding: 20px 40px;
}

.logo {
    font-weight: bold;
    font-size: 20px;
}

.lang-btn {
    cursor: pointer;
    background: #ffffff10;
    padding: 8px 15px;
    border-radius: 10px;
}

/* HERO */
.hero {
    text-align: center;
    margin-top: 50px;
}

.hero h1 {
    font-size: 42px;
}

.hero p {
    opacity: 0.7;
}

/* INPUT */
.form-box {
    margin-top: 30px;
}

input {
    padding: 15px;
    width: 300px;
    border-radius: 25px;
    border: none;
    outline: none;
}

button {
    padding: 15px 25px;
    border-radius: 25px;
    border: none;
    background: linear-gradient(45deg,#ff7b00,#ffae00);
    color: white;
    cursor: pointer;
}

/* LOADER */
.loader {
    display: none;
    margin-top: 20px;
}

.spinner {
    border: 4px solid #ffffff20;
    border-top: 4px solid #ff7b00;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    animation: spin 1s linear infinite;
    margin: auto;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* RESULTS */
.results {
    width: 90%;
    max-width: 700px;
    margin: 40px auto;
}

.card {
    background: #ffffff08;
    padding: 15px;
    border-radius: 15px;
    margin-top: 10px;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.03);
}

/* COUNTER */
.counter {
    text-align: center;
    margin-top: 20px;
    font-size: 18px;
}

/* FOOTER */
footer {
    text-align: center;
    margin-top: 50px;
    padding: 20px;
    opacity: 0.5;
}
</style>
</head>

<body>

<nav>
    <div class="logo">🚀 Web Insight Pro</div>
    <div class="lang-btn" onclick="toggleLang()">🌐 عربي</div>
</nav>

<div class="hero">
    <h1 id="title">Analyze Websites Like a Pro</h1>
    <p id="desc">Extract headings instantly</p>

    <form method="POST" class="form-box" onsubmit="showLoader()">
        <input type="text" name="url" placeholder="Enter URL..." required>
        <button type="submit">Analyze</button>
    </form>

    <div class="loader" id="loader">
        <div class="spinner"></div>
    </div>
</div>

<div class="counter">
    {% if headings %}
        🔍 Found {{ headings|length }} headings
    {% endif %}
</div>

<div class="results">
    {% if headings %}
        {% for tag, text in headings %}
            <div class="card">
                <strong>{{ tag }}</strong>
                <p>{{ text }}</p>
            </div>
        {% endfor %}
    {% endif %}
</div>

<div style="text-align:center; margin-top:20px;">
    <button onclick="copyResults()">📋 Copy Results</button>
</div>

<footer>
    © 2026 Web Insight Pro | Built by Amna 💜
</footer>

<script>
function showLoader(){
    document.getElementById("loader").style.display = "block";
}

function copyResults(){
    let text = "";
    document.querySelectorAll(".card").forEach(card=>{
        text += card.innerText + "\\n";
    });
    navigator.clipboard.writeText(text);
    alert("Copied!");
}

function toggleLang(){
    let title = document.getElementById("title");
    let desc = document.getElementById("desc");

    if(title.innerText.includes("Analyze")){
        title.innerText = "حلل المواقع بسهولة";
        desc.innerText = "استخرج العناوين فوراً";
    } else {
        title.innerText = "Analyze Websites Like a Pro";
        desc.innerText = "Extract headings instantly";
    }
}
</script>

</body>
</html>
