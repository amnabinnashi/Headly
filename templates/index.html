<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Headly | Web Analyzer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            color: white;
            min-height: 100vh;
        }

        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo img {
            height: 40px;
        }

        .logo h2 {
            font-size: 24px;
        }

        .nav-text {
            opacity: 0.7;
        }

        /* Main */
        .container {
            text-align: center;
            margin-top: 80px;
            padding: 20px;
        }

        .title {
            font-size: 48px;
            font-weight: bold;
        }

        .subtitle {
            margin-top: 10px;
            opacity: 0.8;
        }

        /* Input */
        .search-box {
            margin-top: 30px;
        }

        input {
            padding: 15px;
            width: 60%;
            max-width: 400px;
            border-radius: 30px;
            border: none;
            outline: none;
        }

        button {
            padding: 15px 25px;
            border: none;
            border-radius: 30px;
            margin-left: 10px;
            background: linear-gradient(45deg, #ff7e5f, #feb47b);
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }

        /* Results */
        .results {
            margin-top: 40px;
        }

        .card {
            background: rgba(255,255,255,0.1);
            margin: 10px auto;
            padding: 15px;
            border-radius: 15px;
            width: 80%;
            max-width: 500px;
            text-align: left;
        }

        .tag {
            color: #ffcc70;
            font-weight: bold;
        }

        /* Footer */
        footer {
            text-align: center;
            margin-top: 80px;
            padding: 20px;
            opacity: 0.6;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <div class="navbar">
        <div class="logo">
            <!-- الشعار -->
            <img src="{{ url_for('static', filename='logo.png') }}" alt="logo">
            <h2>Headly</h2>
        </div>

        <div class="nav-text">
            Web Analyzer
        </div>
    </div>

    <!-- Main -->
    <div class="container">
        <div class="title">Analyze Websites Easily</div>
        <div class="subtitle">
            Extract headings (H1, H2, H3) from any website instantly
        </div>

        <!-- Form -->
        <form method="POST" class="search-box">
            <input type="text" name="url" placeholder="Enter website URL..." required>
            <button type="submit">Analyze</button>
        </form>

        <!-- Results -->
        <div class="results">
            {% if headings %}
                <p>Found {{ headings|length }} headings</p>

                {% for tag, text in headings %}
                    <div class="card">
                        <div class="tag">{{ tag }}</div>
                        <div>{{ text }}</div>
                    </div>
                {% endfor %}
            {% endif %}
        </div>
    </div>

    <!-- Footer -->
    <footer>
        © 2026 Headly. All rights reserved.
    </footer>

</body>
</html>
