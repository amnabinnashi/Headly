<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Headly</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #6a5acd, #8a7cff);
    color: white;
    text-align: center;
}

/* Header */
.header {
    padding: 40px 20px 20px;
}

.header h1 {
    font-size: 32px;
    margin-bottom: 5px;
}

.header p {
    opacity: 0.8;
}

/* Search */
.search-box {
    margin-top: 20px;
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
}

input {
    padding: 12px;
    width: 65%;
    max-width: 350px;
    border-radius: 25px;
    border: none;
    outline: none;
    font-size: 14px;
}

/* زر جديد */
button {
    padding: 12px 18px;
    border-radius: 25px;
    border: none;
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    opacity: 0.9;
}

/* Cards */
.container {
    margin-top: 25px;
    padding-bottom: 40px;
}

/* تصغير الكارد */
.card {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    border-radius: 18px;
    padding: 15px;
    margin: 12px auto;
    width: 85%;
    max-width: 350px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

.card h3 {
    margin-bottom: 8px;
    font-size: 16px;
    opacity: 0.9;
}

.value {
    font-size: 15px;
}

/* Footer */
.footer {
    margin: 20px;
    opacity: 0.7;
    font-size: 13px;
}
</style>

</head>
<body>

<div class="header">
    <h1>Headly</h1>
    <p>Advanced Website Analyzer</p>

    <div class="search-box">
        <input type="text" id="url" placeholder="Enter website URL (https://example.com)">
        <button onclick="analyze()">Analyze</button>
    </div>
</div>

<div class="container">

    <div class="card">
        <h3>SEO Score</h3>
        <div id="score" class="value">-</div>
    </div>

    <div class="card">
        <h3>Meta Title</h3>
        <div id="title" class="value">-</div>
    </div>

    <div class="card">
        <h3>Meta Description</h3>
        <div id="desc" class="value">-</div>
    </div>

    <div class="card">
        <h3>Headings</h3>
        <div id="headings" class="value">-</div>
    </div>

    <div class="card">
        <h3>Links</h3>
        <div id="links" class="value">-</div>
    </div>

    <div class="card">
        <h3>SEO Suggestions</h3>
        <div id="suggestions" class="value">-</div>
    </div>

</div>

<div class="footer">
    © 2026 Headly by Amna
</div>

<script>
async function analyze() {
    const url = document.getElementById("url").value;

    if (!url) {
        alert("Please enter a URL");
        return;
    }

    try {
        const res = await fetch("/analyze", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({url: url})
        });

        const data = await res.json();

        document.getElementById("score").innerText = data.score ?? "-";
        document.getElementById("title").innerText = data.title ?? "-";
        document.getElementById("desc").innerText = data.description ?? "-";

        document.getElementById("headings").innerText =
            `H1: ${data.h1 ?? 0} | H2: ${data.h2 ?? 0} | H3: ${data.h3 ?? 0}`;

        document.getElementById("links").innerText =
            `Internal: ${data.internal_links ?? 0} | External: ${data.external_links ?? 0}`;

        if (data.suggestions && data.suggestions.length > 0) {
            document.getElementById("suggestions").innerHTML =
                data.suggestions.map(s => "• " + s).join("<br>");
        } else {
            document.getElementById("suggestions").innerText = "No suggestions";
        }

    } catch (error) {
        alert("Server error. Make sure backend is running.");
    }
}
</script>

</body>
</html>
